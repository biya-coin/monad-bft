services:
  biyachaind-a:
    image: golang:1.23-bookworm
    working_dir: /chain
    volumes:
      - ./biyachain-home-a:/chain:rw
      - ../biyachain-core/bin/biyachaind:/usr/local/bin/biyachaind
      - ./biyachain-lib:/biyachain-lib:ro
      - abci-a:/shared:rw
    ports:
      - "19900:9900"
    command:
      - /bin/bash
      - -lc
      - |
        set -e
        export LD_LIBRARY_PATH=/biyachain-lib
        chmod +x /usr/local/bin/biyachaind
        rm -f /shared/abci.sock
        exec /usr/local/bin/biyachaind start \
          --home /chain \
          --with-comet=false \
          --transport socket \
          --address unix:///shared/abci.sock \
          --grpc.enable=true \
          --grpc.address=0.0.0.0:9900 \
          --json-rpc.enable=false \
          --optimistic-execution-enabled=${OPTIMISTIC_EXECUTION_ENABLED:-false} \
          --minimum-gas-prices 1byb

  monad-a:
    image: monad-node:local
    depends_on: [biyachaind-a]
    privileged: true
    security_opt:
      - seccomp=unconfined
    environment:
      MONAD_ABCI_ENDPOINT: unix:///shared/abci.sock
      MONAD_COSMOS_GENESIS_PATH: /monad/genesis.json
      RUST_LOG: info
    volumes:
      - ./monad-a:/monad:rw
      - ./genesis.json.reference:/monad/genesis.json:ro
      - abci-a:/shared:rw
      - ../target/release/monad-node:/usr/local/bin/monad-node:ro
      - ../target/release/keystore:/usr/local/bin/keystore:ro
      - ../target/release/sign-name-record:/usr/local/bin/sign-name-record:ro
    networks:
      monad_net:
        ipv4_address: 172.28.0.10
    ports:
      - "18000:8000"
      - "18001:8001"
 
    command:
      - monad-node
      - --secp-identity
      - /monad/id-secp
      - --bls-identity
      - /monad/id-bls
      - --node-config
      - /monad/node.toml
      - --forkpoint-config
      - /monad/forkpoint.toml
      - --validators-path
      - /monad/validators.toml
      - --wal-path
      - /monad/wal
      - --mempool-ipc-path
      - /monad/mempool.sock
      - --control-panel-ipc-path
      - /monad/controlpanel.sock
      - --ledger-path
      - /monad/ledger
      - --statesync-ipc-path
      - /monad/statesync.sock
      - --triedb-path
      - /monad
      - --persisted-peers-path
      - /monad/peers.toml

  biyachaind-b:
