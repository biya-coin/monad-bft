    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      LD_LIBRARY_PATH: /biyachain-lib:/usr/local/lib
    volumes:
      - ./monad-a:/monad:ro
      - ../target/release/monad-rpc:/usr/local/bin/monad-rpc:ro
      - ./biyachain-lib:/biyachain-lib:ro
    networks:
      monad_net:
        ipv4_address: 172.28.0.50
    ports:
      - "8545:8545"
      - "8546:8546"
      - "26657:26657"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        exec monad-rpc \
          --node-config /monad/node.toml \
          --rpc-addr 0.0.0.0 \
          --rpc-port 8545 \
          --comet-port 26657 \
          --cosmos-ipc-path /monad/mempool.sock

networks:
  monad_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
volumes:
  abci-a:
  abci-b:
  abci-c:
  abci-d:
